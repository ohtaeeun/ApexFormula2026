<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apex Formula Race</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:#000;
color:white;
height:100vh;
overflow:hidden;

}


.game{

height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

background:
linear-gradient(#222,#000);

}



/* LOGO */

.logo{

position:absolute;
top:30px;

font-size:35px;
font-weight:900;

color:#e10600;

}



/* COUNT */

#count{

position:absolute;

font-size:100px;

font-weight:900;

color:#e10600;

z-index:10;

}



/* CAR */

.car{

width:280px;
height:100px;

background:linear-gradient(
90deg,
#e10600,
#700000
);


border-radius:50px;

display:flex;

justify-content:center;

align-items:center;


font-size:35px;

font-weight:900;


box-shadow:0 0 50px red;


z-index:3;

}



/* HUD */

.hud{

display:flex;

gap:20px;

margin-top:40px;

z-index:3;

}



.box{

background:#111;

border:1px solid #555;

padding:20px 30px;

border-radius:15px;

text-align:center;

}



/* BUTTON */

.start{

margin-top:40px;

padding:20px 70px;

border:none;

border-radius:40px;


background:#e10600;

color:white;


font-size:22px;

font-weight:bold;


cursor:pointer;

z-index:5;

}



.start:hover{

background:white;

color:red;

}



/* TRACK */

.track{

position:absolute;

bottom:0;

height:40%;

width:100%;


background:

repeating-linear-gradient(
90deg,
#222 0px,
#222 80px,
#333 80px,
#333 160px
);


animation:road 1s linear infinite;

}


@keyframes road{

from{
background-position:0;
}

to{
background-position:160px;
}

}


</style>

</head>


<body>


<div class="game">


<div class="logo" id="logo">

APEX RACING

</div>



<div id="count"></div>



<div class="car" id="car">

AF-01

</div>



<div class="hud" id="hud">


<div class="box">

SPEED<br>

<span id="speed">
000
</span>

km/h

</div>


<div class="box">

LAP<br>

1 / 10

</div>


<div class="box">

POSITION<br>

P1

</div>


</div>



<button class="start" id="startBtn">

START RACE

</button>



<div class="track"></div>



</div>



<script>


let speed = 0;


const button =
document.getElementById("startBtn");


button.addEventListener("click", startRace);



function startRace(){


button.style.display="none";


document.getElementById("logo").style.display="none";

document.getElementById("hud").style.display="none";

document.getElementById("car").style.display="none";


let count =
document.getElementById("count");


let number=3;


count.innerHTML=number;



let timer=setInterval(()=>{


number--;


if(number>0){

count.innerHTML=number;

}

else{


clearInterval(timer);


count.innerHTML="GO!";



setTimeout(()=>{


count.innerHTML="";


document.getElementById("car").style.display="flex";

document.getElementById("hud").style.display="flex";


raceStart();



},1000);



}



},1000);


}



function raceStart(){


let speedText=
document.getElementById("speed");


let car=
document.getElementById("car");



let timer=setInterval(()=>{


speed += 20;


speedText.innerHTML=speed;



car.style.transform=
"translateY(-10px) scale(1.05)";



if(speed>=320){

clearInterval(timer);

}



},300);


}



</script>


</body>

</html>
