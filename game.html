<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apex Formula 2026 Race</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

background:#000;

color:white;

height:100vh;

overflow:hidden;

}



.game{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;


background:

linear-gradient(#222,#000);

}



/* LOGO */

.logo{

position:absolute;

top:30px;

font-size:35px;

font-weight:900;

color:white;

}



/* COUNT */

#count{

position:absolute;

font-size:100px;

font-weight:900;

z-index:50;

}



/* CAR */

.car{

width:280px;

height:100px;


background:

linear-gradient(

90deg,

#aaa,

#333

);


border-radius:50px;


display:flex;

align-items:center;

justify-content:center;


font-size:35px;

font-weight:bold;


box-shadow:

0 0 40px white;


z-index:5;


}




/* HUD */

.hud{

display:flex;

gap:20px;

margin-top:40px;

z-index:5;

}



.box{

background:

rgba(80,80,80,0.5);


padding:20px 30px;


border-radius:15px;


border:

1px solid #aaa;


backdrop-filter:blur(8px);

}



/* START */

.start{

margin-top:40px;


padding:20px 70px;


border-radius:40px;


border:none;


background:#777;


color:white;


font-size:22px;

z-index:10;

}



/* ROAD */

.track{

position:absolute;

bottom:0;

height:40%;

width:100%;


background:

repeating-linear-gradient(

90deg,

#222 0,

#222 80px,

#333 80px,

#333 160px

);


}



/* LEFT */

.steering{

position:absolute;

bottom:40px;

left:40px;


display:flex;

gap:20px;


z-index:30;

}



.steering button{


width:90px;

height:90px;


border-radius:50%;


background:

rgba(150,150,150,.45);


border:

2px solid #aaa;


color:white;


font-size:35px;


backdrop-filter:blur(8px);


}





/* CENTER */

.center-controls{


position:absolute;

bottom:55px;


left:50%;


transform:translateX(-50%);


display:flex;


gap:15px;


z-index:30;


}



.center-controls button{


width:75px;

height:75px;


border-radius:50%;


background:

rgba(150,150,150,.45);


border:

2px solid #aaa;


color:white;


font-weight:bold;


}





/* PEDALS */


.pedals{


position:absolute;


bottom:35px;


right:40px;


display:flex;


gap:15px;


z-index:30;


}



.pedal{


width:90px;


height:180px;


border-radius:20px;


background:

rgba(150,150,150,.45);


border:

2px solid #aaa;


color:white;


font-weight:bold;


writing-mode:vertical-rl;


backdrop-filter:blur(8px);


}



.accel{

height:220px;

}



button:active{

transform:scale(.9);

}



</style>

</head>



<body>


<div class="game">



<div class="logo" id="logo">

APEX FORMULA

</div>



<div id="count"></div>



<div class="car" id="car">

AF-01

</div>




<div class="hud" id="hud">


<div class="box">

SPEED

<br>

<span id="speed">

000

</span>

km/h

</div>


<div class="box">

LAP

<br>

1 / 10

</div>


<div class="box">

POSITION

<br>

P1

</div>


</div>




<button class="start" id="startBtn">

START RACE

</button>



<div class="steering">

<button id="leftBtn">

◀

</button>


<button id="rightBtn">

▶

</button>

</div>





<div class="center-controls">


<button id="drsBtn">

DRS

</button>


<button id="ersBtn">

ERS

</button>


<button id="rearBtn">

◉

</button>


</div>





<div class="pedals">


<button class="pedal" id="brakeBtn">

BRAKE

</button>


<button class="pedal accel" id="accelBtn">

ACCEL

</button>


</div>





<div class="track"></div>


</div>





<script>


let speed=0;

let carX=0;



const car=document.getElementById("car");

const speedText=document.getElementById("speed");





document.getElementById("startBtn")
.onclick=startRace;



function startRace(){


document.getElementById("startBtn").style.display="none";

document.getElementById("logo").style.display="none";


let count=document.getElementById("count");


let n=3;


count.innerHTML=n;



let t=setInterval(()=>{


n--;


if(n>0){

count.innerHTML=n;

}

else{


clearInterval(t);


count.innerHTML="GO!";


setTimeout(()=>{


count.innerHTML="";


},1000);


}


},1000);


}




document.getElementById("accelBtn")
.onpointerdown=()=>{


speed+=10;


speedText.innerHTML=speed;


};





document.getElementById("brakeBtn")
.onclick=()=>{


speed-=20;


if(speed<0) speed=0;


speedText.innerHTML=speed;


};





document.getElementById("leftBtn")
.onclick=()=>{


carX-=30;


car.style.transform=

`translateX(${carX}px)`;



};





document.getElementById("rightBtn")
.onclick=()=>{


carX+=30;


car.style.transform=

`translateX(${carX}px)`;



};





document.getElementById("drsBtn")
.onclick=()=>{


speed+=30;


speedText.innerHTML=speed;


};





document.getElementById("ersBtn")
.onclick=()=>{


speed+=60;


speedText.innerHTML=speed;


};





document.getElementById("rearBtn")
.onclick=()=>{


alert("REAR VIEW");


};



</script>


</body>

</html>
