<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apex Formula Race</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

background:#000;
color:white;
height:100vh;
overflow:hidden;

}


.game{

height:100vh;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;


background:

linear-gradient(
#222,
#000
);

}


/* LOGO */

.logo{

position:absolute;

top:30px;

font-size:35px;

font-weight:900;

color:#e10600;

letter-spacing:3px;

}



/* TRACK */

.track{

position:absolute;

bottom:0;

width:100%;

height:45%;

background:

repeating-linear-gradient(

90deg,

#222 0px,

#222 80px,

#333 80px,

#333 160px

);


animation:road 1s linear infinite;

}


@keyframes road{

from{

background-position:0;

}

to{

background-position:160px;

}

}




/* CAR */

.car{

z-index:2;

width:280px;

height:100px;


background:

linear-gradient(

90deg,

#e10600,

#700000

);


border-radius:50px;


display:flex;

align-items:center;

justify-content:center;


font-size:35px;

font-weight:900;


box-shadow:

0 0 50px red;


transition:.3s;

}





/* HUD */

.hud{

z-index:3;

display:flex;

gap:20px;

margin-top:40px;

}


.box{

background:#111;

border:1px solid #555;

padding:20px 30px;

border-radius:15px;

text-align:center;

}



.start{

z-index:3;

margin-top:40px;

padding:20px 70px;

border:none;

border-radius:40px;


background:#e10600;

color:white;


font-size:22px;

font-weight:bold;


cursor:pointer;

}



.start:hover{

background:white;

color:red;

}




#count{

position:absolute;

font-size:100px;

font-weight:900;

color:#e10600;

}



</style>


</head>


<body>


<div class="game">


<div class="logo">

APEX RACING

</div>



<div id="count"></div>



<div class="car" id="car">

AF-01

</div>




<div class="hud">


<div class="box">

SPEED<br>

<span id="speed">

000

</span>

km/h

</div>


<div class="box">

LAP<br>

1 / 10

</div>


<div class="box">

POSITION<br>

P1

</div>


</div>



<button class="start" id="startRace onclick="startRace()">

START RACE

</button>



<div class="track"></div>



</div>




<script>


let speed=0;


function startRace(){


let count=document.getElementById("count");

let button=document.querySelector(".start");


button.style.display="none";


let num=3;


count.innerHTML=num;



let timer=setInterval(()=>{


num--;


if(num>0){

count.innerHTML=num;

}


else{


clearInterval(timer);


count.innerHTML="GO!";


raceStart();


setTimeout(()=>{

count.innerHTML="";

},1000);


}



},1000);


}



function raceStart(){


let speedText=document.getElementById("speed");


let car=document.getElementById("car");


let interval=setInterval(()=>{


speed+=20;


speedText.innerHTML=speed;



car.style.transform=

"translateY(-10px) scale(1.05)";



if(speed>=320){


clearInterval(interval);


}



},300);



}


</script>


</body>

</html>
