<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Apex Formula Game</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}


body{

background:#020202;

color:white;

height:100vh;

overflow:hidden;

}



/* GAME SCREEN */

.game{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;


background:

linear-gradient(
#151515,
#000
);

}



/* LOGO */

.logo{

position:absolute;

top:30px;

font-size:35px;

font-weight:900;

letter-spacing:3px;

color:#e10600;

}



/* CAR */

.car{

width:280px;

height:110px;


background:

linear-gradient(
90deg,
#e10600,
#550000
);


border-radius:60px;


display:flex;

align-items:center;

justify-content:center;


font-size:40px;

font-weight:900;


box-shadow:

0 0 40px red;


animation:drive 2s infinite alternate;

}



@keyframes drive{

from{

transform:translateX(-50px);

}


to{

transform:translateX(50px);

}

}



/* HUD */

.hud{

display:flex;

gap:25px;

margin-top:50px;

}



.box{

background:#111;

border:1px solid #333;

border-radius:15px;

padding:20px 35px;

text-align:center;

font-size:18px;

}



/* START BUTTON */

.start{

margin-top:50px;


padding:20px 80px;


border:none;

border-radius:40px;


background:#e10600;

color:white;


font-size:22px;

font-weight:bold;


cursor:pointer;


transition:.3s;

}



.start:hover{

background:white;

color:#e10600;

transform:scale(1.1);

}




</style>


</head>


<body>


<div class="game">


<div class="logo">

APEX RACING

</div>



<div class="car">

AF-01

</div>




<div class="hud">


<div class="box">

SPEED<br>

000 km/h

</div>



<div class="box">

LAP<br>

1 / 10

</div>



<div class="box">

POSITION<br>

P1

</div>



</div>




<button class="start">

START RACE

</button>




</div>



</body>


</html>
