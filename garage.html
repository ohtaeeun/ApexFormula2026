<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apex Formula Garage</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

height:100vh;

background:

linear-gradient(
#111,
#000
);

color:white;

overflow:hidden;

}



.garage{

height:100vh;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

}



/* TITLE */

.title{

position:absolute;

top:50px;

font-size:45px;

font-weight:900;

letter-spacing:5px;

}



/* CAR */

.car{

width:420px;

height:150px;


background:

linear-gradient(
90deg,
#aaa,
#333
);


border-radius:80px;


display:flex;

align-items:center;

justify-content:center;


font-size:50px;

font-weight:900;


box-shadow:

0 0 60px white;


margin-bottom:50px;


}



/* INFO */

.info{

display:flex;

gap:30px;

margin-bottom:40px;

}



.box{

background:

rgba(120,120,120,.35);


padding:20px 40px;


border-radius:15px;


border:1px solid #aaa;


backdrop-filter:blur(10px);


text-align:center;

}



/* BUTTON */

.start{


padding:25px 100px;


border:none;


border-radius:50px;


background:

#888;


color:white;


font-size:25px;


font-weight:bold;


cursor:pointer;


transition:.3s;


}



.start:hover{

background:white;

color:#000;

transform:scale(1.05);

}




.bottom{

position:absolute;

bottom:30px;

font-size:18px;

opacity:.7;

}


</style>


</head>


<body>



<div class="garage">


<div class="title">

APEX GARAGE

</div>




<div class="car">

AF-01

</div>




<div class="info">


<div class="box">

ENGINE

<br>

V6 TURBO

</div>



<div class="box">

POWER

<br>

1000 HP

</div>



<div class="box">

TOP SPEED

<br>

350 KM/H

</div>


</div>





<button class="start" onclick="startRace()">

START RACE

</button>





<div class="bottom">

FORMULA 2026 PROJECT

</div>



</div>





<script>


function startRace(){


location.href="race.html";


}


</script>



</body>

</html>
