<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apex Formula 2026</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.screen{
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#000,#111);
}

h1{
font-size:64px;
margin-bottom:50px;
letter-spacing:3px;
}

.menu{
display:flex;
flex-direction:column;
gap:20px;
width:300px;
}

button{
padding:18px;
font-size:24px;
background:#e10600;
color:white;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:#ff2b2b;
}

.version{
position:absolute;
bottom:20px;
font-size:14px;
color:#777;
}

#garage,
#settings,
#credits{
display:none;
}

.back{
margin-top:40px;
background:#333;
}
</style>

</head>
<body>

<div id="menu" class="screen">

<h1>Apex Formula 2026</h1>

<div class="menu">

<button onclick="openPage('racing')">🏎 RACING</button>

<button onclick="openPage('garage')">🔧 GARAGE</button>

<button onclick="openPage('settings')">⚙ SETTINGS</button>

<button onclick="openPage('credits')">👥 CREDITS</button>

</div>

<div class="version">
Version 0.2 Alpha
</div>

</div>

<div id="racing" class="screen" style="display:none;">

<h1 style="color:#e10600;">RACING</h1>

<p>차량 선택 화면은 다음 업데이트에서 추가됩니다.</p>

<button class="back" onclick="goHome()">
← BACK
</button>

</div>

<div id="garage" class="screen">

<h1>GARAGE</h1>

<p>준비 중...</p>

<button class="back" onclick="goHome()">
← BACK
</button>

</div>

<div id="settings" class="screen">

<h1>SETTINGS</h1>

<p>준비 중...</p>

<button class="back" onclick="goHome()">
← BACK
</button>

</div>

<div id="credits" class="screen">

<h1>CREDITS</h1>

<p>Developer : You</p>
<p>AI Partner : ChatGPT</p>

<button class="back" onclick="goHome()">
← BACK
</button>

</div>

<script>

function openPage(page){

document.getElementById("menu").style.display="none";

document.getElementById("racing").style.display="none";
document.getElementById("garage").style.display="none";
document.getElementById("settings").style.display="none";
document.getElementById("credits").style.display="none";

document.getElementById(page).style.display="flex";

}

function goHome(){

document.getElementById("racing").style.display="none";
document.getElementById("garage").style.display="none";
document.getElementById("settings").style.display="none";
document.getElementById("credits").style.display="none";

document.getElementById("menu").style.display="flex";

}

</script>

</body>
</html>
