<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Formula 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

.screen{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:0.5s;
}

#menu{
background:linear-gradient(135deg,#111,#222);
color:white;
}

#game{
display:none;
background:#000;
}

h1{
font-size:70px;
margin-bottom:20px;
}

p{
font-size:24px;
opacity:.8;
margin-bottom:40px;
}

button{

padding:18px 55px;
font-size:24px;
border:none;
border-radius:50px;
background:#e10600;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{

transform:scale(1.08);

}

#game h1{

color:#e10600;
font-size:90px;
letter-spacing:10px;

}

</style>

</head>

<body>

<div id="menu" class="screen">

<h1>Apex Formula 2026</h1>

<p>Web Formula Racing Game</p>

<button onclick="startGame()">

LET'S GO

</button>

</div>

<div id="game" class="screen">

<h1>RACING</h1>

<button onclick="race()">

RACING

</button>

</div>

<script>

function startGame(){

document.getElementById("menu").style.display="none";

document.getElementById("game").style.display="flex";

}

function race(){

alert("레이싱 모드는 다음 업데이트에서 제작됩니다.");

}

</script>

</body>
</html>
